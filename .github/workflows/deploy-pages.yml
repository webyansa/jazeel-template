name: Deploy Jazeel Template to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment folder
        run: |
          mkdir -p _site/jazeel
          # Copy the root index.html (redirect page)
          cp index.html _site/index.html
          # Copy all template files
          cp -r public/jazeel/* _site/jazeel/
          # Copy logo and other public assets
          cp -r public/jazeel-logo.svg _site/jazeel-logo.svg 2>/dev/null || true
          cp -r public/placeholder.svg _site/placeholder.svg 2>/dev/null || true
          # Fix the redirect path in root index.html (remove /public prefix)
          sed -i 's|./public/jazeel/home.html|./jazeel/home.html|g' _site/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
